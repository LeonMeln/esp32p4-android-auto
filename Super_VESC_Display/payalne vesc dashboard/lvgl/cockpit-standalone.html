<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cockpit Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Barlow+Condensed:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;width:800px;height:480px;font-family:'Barlow Condensed',sans-serif}
  :root{--bg0:#07090a;--bg1:#0d1113;--bg2:#161b1e;--line:#1f2629;--line2:#2a3236;--text:#e8edee;--dim:#8a9499;--faint:#4a5358;--accent:#b6ff2e}
  .dash{width:800px;height:480px;background:var(--bg0);color:var(--text);position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono',monospace}
  .num{font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}
  .dim{color:var(--dim)}
</style></head>
<body>
<div class="dash">
  <!-- Status bar -->
  <div style="position:absolute;top:0;left:0;right:0;height:32px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;background:var(--bg0)">
    <div style="display:flex;gap:14px"><span style="color:var(--accent);font-weight:700;letter-spacing:.16em">VESC</span><span>SPORT</span><span>00:42:18</span></div>
    <div style="display:flex;gap:14px"><span style="color:var(--accent)">BT</span><span>GPS</span><span>48°C</span></div>
  </div>

  <!-- Body grid -->
  <div style="position:absolute;top:32px;left:0;right:0;bottom:80px;display:grid;grid-template-columns:180px 1fr 180px">
    <!-- Battery -->
    <div style="padding:24px 16px 16px 20px;border-right:1px solid var(--line);display:flex;flex-direction:column">
      <div class="mono" style="font-size:9px;letter-spacing:.18em;color:var(--dim);margin-bottom:10px">BATTERY</div>
      <div class="num" style="font-weight:800;font-size:64px;line-height:.9;color:var(--accent)">68<span style="font-size:24px;color:var(--dim);font-weight:500;margin-left:4px">%</span></div>
      <div class="mono" style="font-size:12px;color:var(--dim);margin-top:4px">54.2 V</div>
      <div style="margin-top:18px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:3px">
        <script>for(let i=0;i<14;i++){const filled=(13-i)/14<0.68;document.write('<div style="height:12px;background:'+(filled?'var(--accent)':'var(--bg2)')+';border-radius:1px"></div>')}</script>
      </div>
      <div class="mono" style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:10px;letter-spacing:.06em"><span>RANGE</span><span style="color:var(--text)">38 KM</span></div>
    </div>

    <!-- Speed -->
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative">
      <div class="mono" style="font-size:10px;letter-spacing:.3em;color:var(--dim);margin-bottom:4px">SPEED · KM/H</div>
      <div class="num" style="font-weight:800;font-size:220px;line-height:.85;color:var(--text);letter-spacing:-.04em">32</div>
      <div style="width:320px;margin-top:14px;position:relative;height:6px;background:var(--bg2);border-radius:2px;overflow:hidden">
        <div style="width:53%;height:100%;background:var(--accent)"></div>
        <script>for(let i=1;i<12;i++){document.write('<div style="position:absolute;left:'+(i/12*100)+'%;top:0;bottom:0;width:2px;background:var(--bg2)"></div>')}</script>
      </div>
      <div class="mono" style="display:flex;justify-content:space-between;width:320px;font-size:9px;color:var(--faint);margin-top:6px"><span>0</span><span>MAX 60</span></div>
    </div>

    <!-- Power -->
    <div style="padding:24px 20px 16px 16px;border-left:1px solid var(--line);display:flex;flex-direction:column;align-items:flex-end">
      <div class="mono" style="font-size:9px;letter-spacing:.18em;color:var(--dim);margin-bottom:10px">POWER</div>
      <div class="num" style="font-weight:800;font-size:64px;line-height:.9;color:var(--accent)">1.00<span style="font-size:24px;color:var(--dim);font-weight:500;margin-left:4px">kW</span></div>
      <div class="mono" style="font-size:12px;color:var(--dim);margin-top:4px">18.4 A · 2840 RPM</div>
      <div style="margin-top:18px;width:100%;flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:3px">
        <script>for(let i=0;i<14;i++){const filled=(13-i)/14<0.22;document.write('<div style="height:12px;background:'+(filled?'var(--accent)':'var(--bg2)')+';border-radius:1px"></div>')}</script>
      </div>
      <div class="mono" style="display:flex;justify-content:space-between;width:100%;font-size:10px;color:var(--dim);margin-top:10px"><span>MAX</span><span style="color:var(--text)">4.5 KW</span></div>
    </div>
  </div>

  <!-- Bottom strip -->
  <div style="position:absolute;left:0;right:0;bottom:0;height:80px;display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--line);background:var(--bg1)">
    <script>
    const items=[['TRIP','14.2','KM'],['ODO','4128','KM'],['M·TEMP','62','°C'],['C·TEMP','48','°C'],['AVG','24','KM/H']];
    items.forEach((s,i)=>{
      document.write('<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;'+(i<4?'border-right:1px solid var(--line)':'')+'">'+
        '<div class="mono" style="font-size:9px;letter-spacing:.18em;color:var(--dim);margin-bottom:4px">'+s[0]+'</div>'+
        '<div class="num" style="font-weight:700;font-size:32px;line-height:1;color:var(--text)">'+s[1]+'<span style="font-size:12px;color:var(--dim);font-weight:500;margin-left:3px">'+s[2]+'</span></div>'+
        '</div>')
    });
    </script>
  </div>
</div>
</body></html>
