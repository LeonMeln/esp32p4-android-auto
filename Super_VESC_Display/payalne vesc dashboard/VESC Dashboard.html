<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VESC Dashboard — Design Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #f0eee9;
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #2a251f;
    overflow: hidden;
    height: 100%;
  }
  /* ----- shared variables for the dashboards (each artboard inherits, can override) ----- */
  :root {
    --vesc-bg-0: #07090a;     /* deepest */
    --vesc-bg-1: #0d1113;     /* card / panel */
    --vesc-bg-2: #161b1e;     /* raised / chip */
    --vesc-line: #1f2629;
    --vesc-line-2: #2a3236;
    --vesc-text: #e8edee;
    --vesc-text-dim: #8a9499;
    --vesc-text-faint: #4a5358;
    --vesc-accent: #b6ff2e;   /* VESC acid green */
    --vesc-accent-soft: rgba(182,255,46,0.14);
    --vesc-warn: #ffb02e;
    --vesc-danger: #ff3b30;
  }
  /* On-screen pixel-perfect dashboard frame */
  .dash {
    width: 800px;
    height: 480px;
    background: var(--vesc-bg-0);
    color: var(--vesc-text);
    position: relative;
    overflow: hidden;
    font-family: 'Barlow Condensed', 'Rajdhani', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .dash *, .dash *::before, .dash *::after { box-sizing: border-box; }

  /* Helpers reusable across artboards */
  .mono { font-family: 'JetBrains Mono', 'Geist Mono', monospace; }
  .cond { font-family: 'Barlow Condensed', sans-serif; }
  .num  { font-feature-settings: "tnum" 1, "lnum" 1; font-variant-numeric: tabular-nums; }

  /* Subtle status-bar items */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 8px;
    border: 1px solid var(--vesc-line-2);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--vesc-text-dim);
    text-transform: uppercase;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* assumptions card */
  .notes-card {
    background: #fff; border: 1px solid #d8d3c9; border-radius: 8px;
    padding: 18px 22px; font-size: 13px; line-height: 1.55;
    width: 760px; color: #3a342c;
  }
  .notes-card h3 { margin: 0 0 8px 0; font-size: 15px; font-weight: 600; }
  .notes-card ul { margin: 8px 0 0 18px; padding: 0; }
  .notes-card li { margin: 3px 0; }
  .notes-card .kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: #f0eee9; padding: 1px 6px; border-radius: 3px;
    border: 1px solid #d8d3c9;
  }

  /* keep design canvas top-bar clean */
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="dash-bundle.jsx"></script>

</body>
</html>
